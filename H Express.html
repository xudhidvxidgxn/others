<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H Express</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        #container {
            display: flex;
            gap: 12px;
            width: fit-content;
            height: fit-content;
            align-items: center;
        }

        #container>* {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 8px;
        }

        h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            aspect-ratio: 22/9;
            background-color: #e2e2e2;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            text-decoration: none;
            cursor: default;
        }

        .link {
            width: 100%;
        }

        #input {
            font-size: 14px;
            width: 220px;
            flex-shrink: 0;
        }

        #history-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        #history-list>div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 350px;
            padding: 8px 12px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            border-radius: 15px;
            background-color: #e2e2e2;
            box-shadow: 1px 1px 1px #b9b9b9;
            transition:
                transform 0.2s,
                box-shadow 0.2s;
        }

        #history-list>div:hover {
            transform: translateY(-3px);
            box-shadow: 3px 5px 15px #b9b9b9;
        }

        #btn-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            height: fit-content;
            gap: 10px;
        }

        #btn-area>button {
            padding: 4px 8px;
        }

        .button-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 8px;
        }

        .button-bar>* {
            flex-grow: 1;
        }

        #memo-modal {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 1000;
            background-color: rgb(0, 0, 0, 0.5);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        #modal-toggle:checked+#memo-modal {
            visibility: visible;
            opacity: 1;
        }

        #memo-modal>* {
            user-select: none;
        }

        .memo-modal-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
        }

        .memo-modal-content>button {
            outline: none;
            border: none;
            padding: 2px 0;
            box-shadow: 2px 2px 3px #b9b9b9;
            transition: 0.3s;
        }

        .memo-modal-content>button:hover {
            box-shadow: 3px 3px 7px #b9b9b9;
            font-weight: 700;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            font-size: 14px;
        }

        .row>input {
            padding: 6px 10px;
        }

        .memo-span {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            width: 100%;
            word-break: break-all;
            color: #666;
            font-weight: 400;
        }
    </style>
</head>

<body>
    <input type="checkbox" name="modal-toggle" id="modal-toggle" hidden />
    <div id="memo-modal" onclick="memoModalToggle()">
        <div class="memo-modal-content">
            <div class="row">
                <label for="memo-to">л©”лӘЁн•  лІҲнҳё</label>
                <input type="text" id="memo-to" disabled />
            </div>
            <div class="row" onclick="event.stopPropagation()">
                <label for="memo-txt">л©”лӘЁн•  лӮҙмҡ©</label>
                <input type="text" id="memo-txt" />
            </div>
            <button type="submit" onclick="saveMemo()">мһ‘м„ұн•ҳкё°</button>
        </div>
    </div>
    <a href="https:/hitomi.la" target="_blank" rel="noopen noreferrer">
        <h1>H</h1>
    </a>
    <div id="container">
        <input type="text" id="input" inputmode="text" pattern="[0-9]*" autofocus autocomplete="off"
            placeholder="лІҲнҳё лҳҗлҠ” л©”лӘЁ нҳ№мқҖ к°•нҳёмқҳ лҸ„лҰ¬" />
        <button id="go" type="submit">мқҙлҸҷн•ҳкё°</button>
        <button id="change" type="submit" onclick="clearInput()">мҙҲкё°нҷ”</button>
    </div>
    <div id="btn-area">
        <button onclick="clearHistory()">кё°лЎқ ліҙкҙҖмҶҢ мӮӯм ң</button>
        <button onclick="clearAll()">кё°лЎқ ліҙкҙҖмҶҢ мҙҲкё°нҷ”</button>
        <button onclick="exportHistory()" style="background-color: #d1e7dd">кё°лЎқ лӮҙліҙлӮҙкё° (JSON)</button>
        <button onclick="importHistory()" style="background-color: #fff3cd">к°Җм ёмҳӨкё°</button>
    </div>
    <div id="history-list"></div>

    <script>
        // @ts-check
        const input = document.getElementById("input");
        const button = document.getElementById("go");
        const container = document.getElementById("container");
        const history_list = document.getElementById("history-list");

        container.addEventListener("click", btnClick);
        container.addEventListener("keydown", btnClick);
        input.addEventListener("input", autoSearch);
        function autoSearch() {
            /* @type {string} - inputлҗң л°©мӢқ
                 * * к·ёлғҘ мһ…л Ҙн•ҳкё° (insertText)
                 * л¶ҷм—¬л„Јкё° (insertFromPaste)
                 * лҗҳлҸҢлҰ¬кё°
                 * м§Җмҡ°кё°
                 * л“ұл“ұ... 
                const type = ev.inputType;*/

            /* @type {string} - м •к·ңмӢқмңјлЎң мҲ«мһҗл§Ң мһҳлқјлғ„ 
            const only_nums = target.value.replace(/[^0-9]+/g, "");
            const max_length = 7;
            let clipped = only_nums;
            if (clipped.length > max_length) {
                clipped = clipped.slice(0, max_length);
            }

            if (target.value !== clipped) {
                target.value = clipped;
            }*/
            const val = input.value;
            const clean_val = val.replace(/[^0-9]+/g, "");

            const history = getLocalStorage("recent_searches");
            const memo_history = getLocalStorage("memo_storage", {});
            /* const filtered = target.value ? history.filter((item) => item.startsWith(target.value)) : history; */
            const filtered = history.filter((item) => {
                const memo_text = memo_history[item] || "";
                return item.startsWith(val) || memo_text.includes(val) || (clean_val !== "" && item.startsWith(clean_val));
            });

            renderHistory(filtered);
        }
        function btnClick(ev) {
            if (ev.type === "keydown" && ev.key !== "Enter") return;
            if (ev.type === "click" && ev.target !== button) return;

            const val = input.value.replace(/[^0-9]+/g, "");
            if (!(val.length === 7)) {
                alert(`нҳ•мӢқмқҙ лӯ”к°Җ мқҙмғҒн•©лӢҲлӢӨ. (мқёмӢқлҗң нҳ•мӢқ: ${val})`);
                clearInput();
                return;
            }

            saveSearchTerm(val);
            window.open(`https://hitomi.la/galleries/${val}.html`);
            clearInput();
        }
        /** к°•нҳёмқҳ лҸ„лҰ¬лҘј ліҖнҷҳн•ҳлҠ” н•ЁмҲҳ */
        function change() {
            /** @type {string} - inputмһ…лӢҲлӢӨ. */
            const txt = input.value;
            input.value = txt.replace(/[^0-9]+/g, "");
            input.focus();
        }
        /**
         * м ҖмһҘмҶҢм—җ л¬ёмһҗм—ҙ м ҖмһҘн•ҳлҠ” н•ЁмҲҳ (м ҖмһҘмҶҢ кё°ліёк°’мқҖ recent_searches)
         * @param {string} term - м ҖмһҘмҶҢм—җ м ҖмһҘн•  л¬ёмһҗм—ҙ(м—¬кё°м„ңлҠ” лІҲнҳё мң„мЈј)
         * @param {string} [stroage_name = "recent_searches"] - м ҖмһҘмҶҢ мқҙлҰ„ (л¬ёмһҗм—ҙ)
         */
        function saveSearchTerm(term, storage_name = "recent_searches") {
            if (!term || term.trim() === "") return;
            const history = getLocalStorage(storage_name);
            if (term === history[0]) return;
            const new_history = [term, ...history.filter((item) => item !== term)];
            setLocalStorage(storage_name, new_history);
            autoSearch();
        }
        function clearHistory() {
            if (history_list.children.length >= 0) {
                if (confirm("м§„м§ң кё°лЎқ м ҖмһҘмҶҢлҘј мӮӯм ң?")) {
                    localStorage.removeItem("recent_searches");
                    location.reload();
                }
            }
        }
        function clearAll() {
            if (history_list.children.length > 0) {
                if (confirm("м§„м§ң кё°лЎқ м „мІҙ мӮӯм ң?")) {
                    localStorage.clear();
                    location.reload();
                }
            }
        }
        /** inputмқ„ мҙҲкё°нҷ”н•ҳлҠ” н•ЁмҲҳ */
        function clearInput() {
            input.value = "";
            input.focus();
            autoSearch();
        }

        /** memoModalToggle:  л©”лӘЁ мһ‘м„ұм°Ҫ нҶ кёҖ н•ЁмҲҳ
         * лӘЁлӢ¬ мІҙнҒ¬л°•мҠӨлҘј мЎ°м Ҳн•©лӢҲлӢӨ */
        function memoModalToggle() {
            /** @type {HTMLElement} - лӘЁлӢ¬ нҶ кёҖ лІ„нҠј */
            const toggle_btn = document.getElementById("modal-toggle");
            toggle_btn.checked = !toggle_btn.checked;
            if (toggle_btn.checked) {
                setTimeout(() => {
                    const memo_txt = document.getElementById("memo-txt");
                    if (memo_txt) memo_txt.focus();
                }, 50);
            }
            fixScroll();
        }

        /** saveMemo н•ЁмҲҳ 
        * л©”лӘЁ мһ‘м„ұмқ„ м»ЁнҠёлЎӨн•ҳлҠ” н•ЁмҲҳмһ…лӢҲлӢӨ.
        @param {string} key - л©”лӘЁк°Җ мһ‘м„ұлҗ  лІҲнҳёмһ…лӢҲлӢӨ. 
        @param {string} txt - л©”лӘЁ лӮҙмҡ©мһ…лӢҲлӢӨ. 
        @example saveMemo(key, "abc") */
        function saveMemo() {
            /** @type {Object<string, string>} - memoлҠ” ["лІҲнҳё", "л©”лӘЁ"] лЎң мқҙлЈЁм–ҙм§‘лӢҲлӢӨ.*/
            const memos = getLocalStorage("memo_storage", {});
            const key = document.getElementById("memo-to").value;
            const txt = document.getElementById("memo-txt").value;
            if (!getLocalStorage("recent_searches").includes(key)) {
                console.log("мқҙкұҙ лӯҗ н•ҳлҠ” м§“мқҙмӢңмЈ ?");
                return;
            }
            if (txt.trim() === "") {
                if (memos[key]) {
                    delete memos[key];
                }
            } else {
                memos[key] = txt;
            }

            setLocalStorage("memo_storage", memos);
            autoSearch();
            fixScroll();
        }

        /** renderHistory
         * localStorageм—җм„ң мөңк·ј кё°лЎқмқ„ к°Җм ёмҷҖ нҷ”л©ҙм—җ н‘ңмӢңн•ҳлҠ” н•ЁмҲҳмһ…лӢҲлӢӨ. (HTMLdoc кө¬мЎ° нҸ¬н•Ё)
         * @param {list} [custom_data=null] лҰ¬мҠӨнҠёмһ…лӢҲлӢӨ. (custom_dataк°Җ м—Ҷмңјл©ҙ localStorageм—җм„ң recent_searchesлҘј к°Җм ёмҳөлӢҲлӢӨ.)}
         */
        function renderHistory(custom_data = null) {
            if (!history_list) return;

            const history = custom_data || getLocalStorage("recent_searches");
            const memo_history = getLocalStorage("memo_storage", {});

            history_list.innerHTML = "";

            history.forEach((item) => {
                const div = document.createElement("div");
                const button_bar = document.createElement("div");
                button_bar.classList.add("button-bar");
                const a = document.createElement("a");
                a["href"] = `https://hitomi.la/galleries/${item}.html`;
                a.textContent = `${item}`;
                a["target"] = "_blank";
                a["rel"] = "noopen noreferrer";
                a.classList.add("link");
                a.addEventListener("click", () => {
                    saveSearchTerm(item);
                });

                const del = document.createElement("button");
                del.textContent = "мӮӯм ң";
                del.classList.add("button");

                del.addEventListener("click", (ev) => {
                    ev.preventDefault();
                    ev.stopPropagation();
                    if (confirm(`мӮӯм ңн•ҙмҡ”? '${item}' ?`)) {
                        const new_history = history.filter((h) => h !== item);
                        setLocalStorage("recent_searches", new_history);
                        renderHistory();
                    }
                });

                /** @type {HTMLButtonElement} - */
                const memo = document.createElement("button");
                memo.textContent = "л©”лӘЁ";
                memo.classList.add("button");
                memo.addEventListener("click", (ev) => {
                    memoModalToggle();
                    saveSearchTerm(item);
                    const memo_to = document.getElementById("memo-to");
                    const memo_txt = document.getElementById("memo-txt");
                    if (memo_to.value !== item) {
                        memo_txt.value = memo_history[item] || "";
                    }
                    memo_to.value = item;
                    memo_txt.focus();
                });

                div.appendChild(a);
                if (memo_history[item]) {
                    const span = document.createElement("span");
                    span.textContent = memo_history[item];
                    span.classList.add("memo-span");
                    div.appendChild(span);
                }
                button_bar.appendChild(memo);
                button_bar.appendChild(del);
                div.appendChild(button_bar);
                history_list.appendChild(div);


            });
        }

        /**
         * @typedef {Object} ExportResult
         * @property {boolean} success - м„ұкіө м—¬л¶Җ
         * @property {string} [fileName] - м ҖмһҘлҗң нҢҢмқјлӘ…
         */

        /**
         * лӮҙліҙлӮҙкё° м—”м§„
         * нҳ„мһ¬ лЎңм»¬ мҠӨнҶ лҰ¬м§Җм—җ м ҖмһҘлҗң 'мөңк·ј кІҖмғү кё°лЎқ'мқ„ JSON нҢҢмқјлЎң м¶”м¶ңн•©лӢҲлӢӨ.
         * @param {string} storage_key - лӮҙліҙлӮј лЎңм»¬мҠӨнҶ лҰ¬м§Җ нӮӨ (кё°ліёк°’: 'recent_searches')
         * @returns {ExportResult} мһ‘м—… кІ°кіј ліҙкі м„ң
         */
        function exportHistory() {
            try {
                // 1. лҚ°мқҙн„° к°Җм ёмҳӨкё° (мқҙлҜё л§Ңл“Өм–ҙл‘җмӢ  getLocalStorage нҷңмҡ©!)
                const data = { "code": getLocalStorage("recent_searches"), "memo": getLocalStorage("memo_storage") };

                if (!data["code"] || data["memo"].length === 0 || !data["code"] || data["memo"].length === 0) {
                    alert("лӮҙліҙлӮј кё°лЎқмқҙ н…… л№„м–ҙмһҲмҠөлӢҲлӢӨ!");
                    return { success: false };
                }

                // 2. нҢҢмқј мқҙлҰ„ мғқм„ұ (h_backup_2024-05-22.json нҳ•мӢқ)
                // const date = new Date().toISOString().split("T")[0];
                const date = new Date().toLocaleDateString('sv-SE');
                const fileName = `h_express_backup_${date}.json`;

                // 3. Blob мғқм„ұ (лҚ°мқҙн„°лҘј нҢҢмқј лҚ©м–ҙлҰ¬лЎң ліҖнҷҳ)
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });

                // 4. к°ҖмғҒ м•өм»Ө(a) нғңк·ёлҘј мқҙмҡ©н•ң лӢӨмҡҙлЎңл“ң нҠёлҰ¬кұ°
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;

                document.body.appendChild(link);
                link.click(); // к°•м ң нҒҙлҰӯмңјлЎң лӢӨмҡҙлЎңл“ң мӢңмһ‘

                // 5. л’·м •лҰ¬ (л©”лӘЁлҰ¬ н•ҙм ң л°Ҹ нғңк·ё мӮӯм ң)
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                console.log(`рҹҡҖ ${fileName} лӮҙліҙлӮҙкё° м„ұкіө!`);
                return { success: true, fileName };
            } catch (e) {
                console.error("лӮҙліҙлӮҙкё° мӨ‘ мҳӨлҘҳ л°ңмғқ:", e);
                alert("лӮҙліҙлӮҙкё° мӢӨнҢЁ! мҪҳмҶ”мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.");
                return { success: false };
            }
        }
        /**
         * к°Җм ёмҳӨкё° м—”м§„
         * JSON л°ұм—… нҢҢмқјмқ„ мқҪм–ҙ лЎңм»¬ мҠӨнҶ лҰ¬м§Җмқҳ кё°мЎҙ лҚ°мқҙн„°мҷҖ лі‘н•©н•©лӢҲлӢӨ.
         * * * лҸҷмһ‘ мҲңм„ң:
         * 1. нҢҢмқј м„ нғқм°Ҫ лқ„мҡ°кё° (hidden input)
         * 2. нҢҢмқј мқҪкё° (FileReader API)
         * 3. лҚ°мқҙн„° кІҖмҰқ (л°°м—ҙмқём§Җ, 7мһҗлҰ¬ мҲ«мһҗмқём§Җ нҷ•мқё)
         * 4. кё°мЎҙ лҚ°мқҙн„°мҷҖ мӨ‘ліө м ңкұ° л°Ҹ лі‘н•©
         * 5. нҷ”л©ҙ лӢӨмӢң к·ёлҰ¬кё° (renderHistory)
         * * @returns {Promise<boolean>} м„ұкіө мӢң true л°ҳнҷҳ
         */
        function importHistory() {
            return new Promise((resolve) => {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = ".json";

                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return resolve(false);

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            // 1. лҚ°мқҙн„° нҢҢмӢұ
                            const importedData = JSON.parse(event.target.result);

                            // 2. [кІҖмҰқ] к°қмІҙ нҳ•нғңмқём§Җ, лӮҙл¶Җ нӮӨ(code, memo)к°Җ мЎҙмһ¬н•ҳлҠ”м§Җ нҷ•мқё
                            if (typeof importedData !== 'object' || importedData === null) {
                                throw new Error("мҳ¬л°”лҘё л°ұм—… нҢҢмқј нҳ•мӢқмқҙ м•„лӢҷлӢҲлӢӨ.");
                            }


                            const { code, memo } = importedData;

                            // 1. [кө¬мЎ° кІҖмҰқ] codeлҠ” л°°м—ҙ, memoлҠ” (nullмқҙ м•„лӢҢ) к°қмІҙмқём§Җ нҷ•мқё
                            if (!Array.isArray(code) || typeof memo !== 'object' || memo === null || Array.isArray(memo)) {
                                throw new Error("лҚ°мқҙн„° кө¬мЎ°к°Җ мҶҗмғҒлҗҳм—ҲмҠөлӢҲлӢӨ (codeлҠ” л°°м—ҙ, memoлҠ” к°қмІҙм—¬м•ј н•©лӢҲлӢӨ).");
                            }

                            // 2. [к°ңлі„ кІҖмҰқ] code н•ӯлӘ© кІҖмӮ¬ (7мһҗлҰ¬ мҲ«мһҗ)
                            const isCodeValid = code.every((item) => /^[0-9]{7}$/.test(item));
                            if (!isCodeValid) throw new Error("мң нҡЁн•ҳм§Җ м•ҠмқҖ мҪ”л“ң нҳ•мӢқмқҙ нҸ¬н•Ёлҗҳм–ҙ мһҲмҠөлӢҲлӢӨ.");

                            // 3. [к°ңлі„ кІҖмҰқ] memo н•ӯлӘ© кІҖмӮ¬ (лӘЁл“  к°’(value)мқҙ л¬ёмһҗм—ҙмқём§Җ)
                            const isMemoValid = Object.values(memo).every(val => typeof val === 'string');
                            if (!isMemoValid) throw new Error("л©”лӘЁмқҳ лӮҙмҡ© мӨ‘ л¬ёмһҗм—ҙмқҙ м•„лӢҢ кІғмқҙ м„һм—¬ мһҲмҠөлӢҲлӢӨ.");

                            // 4. лҚ°мқҙн„° лі‘н•©
                            // [л°°м—ҙ лі‘н•©] мөңк·ј кІҖмғү кё°лЎқ (SetмңјлЎң мӨ‘ліө м ңкұ°)
                            const currentHistory = getLocalStorage("recent_searches") || [];
                            const mergedHistory = [...new Set([...code, ...currentHistory])];

                            // [к°қмІҙ лі‘н•©] л©”лӘЁ (мҠӨн”„л Ҳл“ң м—°мӮ°мһҗлЎң лі‘н•©, нӮӨк°Җ к°ҷмңјл©ҙ мғҲ лҚ°мқҙн„°к°Җ лҚ®м–ҙм”Җ)
                            const currentMemos = getLocalStorage("memo_storage") || {};
                            const mergedMemos = { ...currentMemos, ...memo };

                            // 5. м ҖмһҘ л°Ҹ UI к°ұмӢ 
                            setLocalStorage("recent_searches", mergedHistory);
                            setLocalStorage("memo_storage", mergedMemos);

                            // нҷ”л©ҙмқ„ лӢӨмӢң к·ёлҰ¬лҠ” н•ЁмҲҳл“Ө нҳём¶ң
                            if (typeof renderHistory === 'function') renderHistory();
                            if (typeof renderMemos === 'function') renderMemos(); // л©”лӘЁ л ҢлҚ”л§Ғ н•ЁмҲҳк°Җ мһҲлӢӨл©ҙ м¶”к°Җ

                            alert(`м„ұкіөм ҒмңјлЎң лҚ°мқҙн„°лҘј к°Җм ёмҷ”мҠөлӢҲлӢӨ!\n(кё°лЎқ: ${code.length}к°ң, л©”лӘЁ: ${Object.keys(memo).length}к°ң)`);
                            resolve(true);
                        } catch (err) {
                            alert(`к°Җм ёмҳӨкё° мӢӨнҢЁ: ${err.message}`);
                            resolve(false);
                        }
                    };
                    reader.readAsText(file);
                };

                input.click();
            });
        }
        /**
         * м ҖмһҘмҶҢ мқҙлҰ„ л°ӣм•„м„ң к°Җм ёмҳөлӢҲлӢӨ
         * @param {string} [storage_name = "recent_searches"] - м ҖмһҘмҶҢмқҳ мқҙлҰ„ (л¬ёмһҗм—ҙмқҙм–ҙм•ј н•ҙ!)
         * @param {any} default_value - лҚ°мқҙн„°к°Җ м—Ҷмқ„ кІҪмҡ° м ҖмһҘн•  мҙҲкё°к°’ (кё°ліёк°’: [])
         * @returns {any} нҢҢмӢұлҗң лҚ°мқҙн„° к°қмІҙ лҳҗлҠ” л°°м—ҙ
         */
        function getLocalStorage(storage_name = "recent_searches", default_value = []) {
            const data = localStorage.getItem(storage_name);

            // лҚ°мқҙн„°к°Җ м—Ҷмңјл©ҙ мҙҲкё°к°’мқ„ м ҖмһҘн•ҳкі  л°ҳнҷҳн•©лӢҲлӢӨ.
            if (data === null) {
                return default_value;
            }

            // лҚ°мқҙн„°к°Җ мһҲмңјл©ҙ JSONмңјлЎң ліҖнҷҳн•ҙм„ң л°ҳнҷҳн•©лӢҲлӢӨ.
            try {
                return JSON.parse(data);
            } catch (e) {
                console.error("localStorage нҢҢмӢұ м—җлҹ¬:", e);
                return default_value;
            }
        }

        /**
         * лҚ°мқҙн„°лҘј JSON л¬ёмһҗм—ҙлЎң ліҖнҷҳн•ҳм—¬ localStorageм—җ м ҖмһҘн•©лӢҲлӢӨ.
         * @param {string} [storage_name=recent_searches] - лЎңм»¬мҠӨнҶ лҰ¬м§Җ нӮӨ мқҙлҰ„ (м—Ҷмңјл©ҙ recent_searches)
         * @param {any} data - м ҖмһҘн•  лҚ°мқҙн„° (к°қмІҙлӮҳ л°°м—ҙ л“ұ)
         */
        function setLocalStorage(storage_name = "recent_searches", data) {
            localStorage.setItem(storage_name, JSON.stringify(data));
        }

        function fixScroll() {
            window.scrollTo({
                top: 0,
                left: 0,
                behavior: "instant",
            });
        }
        window.addEventListener("DOMContentLoaded", () => {
            renderHistory();
        });
        document.getElementById("memo-txt").addEventListener("keydown", (ev) => {
            if (ev.key === "Enter") {
                saveMemo();
                memoModalToggle();
            }
            if (ev.key === "Escape") {
                memoModalToggle();
            }
        });
    </script>
