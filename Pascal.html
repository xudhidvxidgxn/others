<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100vw;
                padding: 20px;
                gap: 10px;
            }
            #display {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <input type="text" id="input" autocomplete="off" inputmode="numeric"/>
        <pre id="display"></pre>
        <script>
            // @ts-check
            const input = /** @type {HTMLInputElement} - id로 가져온 input입니다 */ (document.getElementById("input"));
            const display = /** @type {HTMLPreElement} - id로 가져온 pre입니다 */ (document.getElementById("display"));

            /** input값에 따라 파스칼 삼각형 만들기 */
            function displayPascal() {
                /** @type {string} - 정규식 필터 거친 value*/
                const only_nums = input.value.replace(/[^0-9]+/g, "");
                const max_length = 3;
                let clipped = only_nums;
                if (clipped.length > max_length) {
                    clipped = clipped.slice(-max_length);
                }

                if (input.value !== clipped) {
                    input.value = clipped;
                }
                const n = parseInt(input.value);
                if (isNaN(n) || n <= 0) return;

                /** @type {number[][]} */
                let triangle = [];

                for (let i = 0; i < n; i++) {
                    triangle[i] = []; // 새로운 층 생성
                    for (let j = 0; j <= i; j++) {
                        if (j === 0 || j === i) {
                            // 양 끝은 무조건 1
                            triangle[i][j] = 1;
                        } else {
                            // 내 머리 위 두 놈 더하기
                            triangle[i][j] = triangle[i - 1][j - 1] + triangle[i - 1][j];
                        }
                    }
                }

                // 화면에 그리기
                display.textContent = triangle.map((row) => row.join(" ")).join("\n");
            }

            // 값이 바뀔 때마다 실행하기
            input.addEventListener("input", displayPascal);
        </script>
    </body>
</html>
