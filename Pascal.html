<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                user-select: none;
            }
            html {
                background-color: #000;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100vw;
                padding: 20px;
                gap: 10px;
                color: #fff;
            }
            #display {
                text-align: center;
            }
            div {
                display: flex;
                gap: 10px;
            }
            div > button {
                padding: 5px 8px;
            }
            div > input {
                padding: 5px 8px;
            }
        </style>
    </head>
    <body>
        <div>
            <input type="text" id="input" autocomplete="off" inputmode="numeric" value="1" />
            <button id="plus">+1</button>
            <button id="minus">-1</button>
            <button id="reset">초기회</button>
        </div>
        <pre id="display"></pre>
        <script>
            // @ts-check
            const input = /** @type {HTMLInputElement} */ (document.getElementById("input"));
            const display = /** @type {HTMLPreElement} */ (document.getElementById("display"));
            const plus = /** @type {HTMLButtonElement} */ (document.getElementById("plus"));
            const minus = /** @type {HTMLButtonElement} */ (document.getElementById("minus"));
            const reset = /** @type {HTMLButtonElement} */ (document.getElementById("reset"));

            let delayTimer = null;
            let repeatTimer = null;

            /**
             *@param {string} val
             * @param {number} max
             * @returns {string}
             */
            function senitizeNumber(val, max) {
                /** @type {string} - 정규식 필터 거친 value*/
                const nums = val.replace(/[^0-9]+/g, "");
                return nums.length > max ? nums.slice(-max) : nums;
            }
            /** input값에 따라 파스칼 삼각형 만들기 */
            function displayPascal() {
                let clipped = senitizeNumber(input.value, 3);

                if (input.value !== clipped) {
                    input.value = clipped;
                }
                const n = parseInt(input.value);
                if (isNaN(n) || n <= 0) return;

                /** @type {number[][]} */
                let triangle = [];

                for (let i = 0; i < n; i++) {
                    triangle[i] = []; // 새로운 층 생성
                    for (let j = 0; j <= i; j++) {
                        if (j === 0 || j === i) {
                            // 양 끝은 무조건 1
                            triangle[i][j] = 1;
                        } else {
                            // 내 머리 위 두 놈 더하기
                            triangle[i][j] = triangle[i - 1][j - 1] + triangle[i - 1][j];
                        }
                    }
                }

                // 화면에 그리기
                display.textContent = triangle.map((row) => row.join(" ")).join("\n");
            }
            /** input 값 +1 */
            function inputPlus() {
                // input.valueAsNumber
                let num = parseInt(input.value);
                if (isNaN(num)) num = 0;
                input.value = String(num + 1);
                displayPascal();
            }
            /** input 값 -1 */
            function inputMinus() {
                // input.valueAsNumber
                let num = parseInt(input.value);
                if (isNaN(num) || num < 0) num = 0;
                if (num > 1) input.value = String(num - 1);
                displayPascal();
            }
            /** input 값 초기화 */
            function inputReset() {
                input.value = "1";
                displayPascal();
            }
            /** 다다다락- 실행하는 함수 */
            function startRepeat(amount) {
                if (delayTimer || repeatTimer) return; // 이미 돌고 있으면 중복 실행 방지
                let num = parseInt(input.value);
                if (isNaN(num) || num < 0) num = 0;

                input.value = String(num + amount);
                displayPascal();

                delayTimer = setTimeout(() => {
                    repeatTimer = setInterval(() => {
                        let num = parseInt(input.value);
                        if (isNaN(num) || num < 0) num = 0;
                        input.value = String(num + amount);
                        displayPascal();
                    }, 50);
                }, 500);
            }

            /** 타이머 멈추는 함수 */
            function stopRepeat() {
                clearTimeout(delayTimer);
                clearInterval(repeatTimer);
                delayTimer = null;
                repeatTimer = null;
            }

            /* * 꾹 누르기 기계
             * @param {() => void} action 실행할 함수 (stepUp 등)
             */
            //function createLongPressHandler(action) {
            //    let delayTimer = null;
            //    let repeatTimer = null;
            //
            //    const stop = () => {
            //        clearTimeout(delayTimer);
            //        clearInterval(repeatTimer);
            //        delayTimer = null;
            //        repeatTimer = null;
            //    };
            //
            //    const start = () => {
            //        stop(); // 혹시 돌고 있을지 모를 타이머 초기화
            //        action(); // 딸깍 실행
            //        delayTimer = setTimeout(() => {
            //            repeatTimer = setInterval(action, 100); // 다다다락 실행
            //        }, 500);
            //    };
            //
            //    return { start, stop };
            //}

            // 값이 바뀔 때마다 실행하기
            window.addEventListener("load", displayPascal);
            input.addEventListener("input", displayPascal)
            plus.addEventListener("mousedown", () => startRepeat(1));
            plus.addEventListener("mouseup", stopRepeat);
            plus.addEventListener("mouseleave", stopRepeat);
            minus.addEventListener("click", inputMinus);
            reset.addEventListener("click", inputReset);
        </script>
    </body>
</html>
