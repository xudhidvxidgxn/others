<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="1/1.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    
        html,
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            min-height: 100vh;
            gap: 20px;
            overflow-x: hidden;
        }

        #inputs {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: fit-content;
            flex-wrap: wrap;
        }
    
        input {
            padding: 4px 8px;
        }
    
        #display {
            width: 80%;
            max-width: 600px;
            white-space: pre-wrap;
            word-break: break-all;
            text-align: center;
            font-size: 1rem;
            /* background-color: rgb(0, 0, 0, 0.2); */
        }
    </style>
</head>
<body>
    <div id="inputs">
        <input type="text" id="x" inputmode="numeric" autocomplete="off" autofocus>
        <input type="text" id="y" inputmode="numeric" autocomplete="off">
    </div>
    <pre id="display">여기에 표시됩니다.</pre>
    <script>
        // @ts-check
        const inputs = /** @type {HTMLDivElement} */ (document.querySelector("#inputs"));
        const x_input = /** @type {HTMLInputElement} */ (document.querySelector("#x"));
        const y_input = /** @type {HTMLInputElement} */ (document.querySelector("#y"));
        const display = /** @type {HTMLPreElement} */ (document.querySelector("#display"));

        function formatWithComma(str) {
            // 1. 일단 입력받은 걸 문자열로 바꿉니다.
            const s = String(str);
            // 2. 정규표현식으로 뒤에서부터 3자리마다 콤마를 찍습니다.
            return s.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        inputs.addEventListener("input", (ev) => {
            const x_val = x_input.value.replace(/[^0-9]/g, "");
            const y_val = y_input.value.replace(/[^0-9]/g, "");
            if (x_input.value !== x_val) x_input.value = x_val;
            if (y_input.value !== y_val) y_input.value = y_val;
            const x = BigInt(x_input.value || "2");
            const y = BigInt(y_input.value || "1");

            display.textContent = `${x}\n*\n${y}\n=\n${formatWithComma(x * y)}`;
        });

        inputs.addEventListener("keydown", (ev) => {
            if (ev.key === "Tab") {
                ev.preventDefault();
                if (ev.target === x_input) { y_input.focus(); y_input.select(); }
                if (ev.target === y_input) { x_input.focus(); x_input.select(); }
            }
        });

    </script>
    <!-- <script src="1/1.js"></script> -->
</body>
</html>
