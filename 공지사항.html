<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>공지사항</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                user-select: none;
            }
            html,
            body {
                width: 100vw;
                height: 100vh;
            }
            body {
                display: flex;
                align-items: center;
                padding: 20px;
            }
            .content-list {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }
            [class*="menu"] {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                width: 100%;
                height: 100%;
            }
            input {
                padding: 5px 8px;
            }
        </style>
    </head>
    <body>
        <div class="left-menu">
            <input type="text" class="input" autofocus />
            <div class="content-list"></div>
            <template id="input-temp">
                <input type="text" class="content" />
            </template>
        </div>
        <div class="right-menu">
            <pre id="display"></pre>
        </div>
        <script>
            // @ts-check

            /**
             * [STATE] 모든 데이터의 근원
             * * 0번 인덱스는 제목, 그 이후는 리스트 아이템입니다. */
            let contentData = [""];

            const input_main = /** @type {HTMLInputElement} */ (document.querySelector(".input"));
            const content_list = document.querySelector(".content-list");
            const display = /** @type {HTMLPreElement} */ (document.querySelector("#display"));
            const input_temp = /** @type {HTMLTemplateElement} */ (document.querySelector("#input-temp"));

            /** * [RENDER] 데이터를 바탕으로 오른쪽 결과창을 그립니다. */
            function render() {
                // 0번(제목)은 글자 사이 공백 추가
                const styledTitle = contentData[0].split("").join(" ");

                let resultHTML = `☆ ${styledTitle} ☆\n`;
                if (contentData.length > 1) {
                    const listItems = contentData
                        .slice(1)
                        .map((text, idx) => `    ${idx + 1}. ${text}`)
                        .join("\n");
                    resultHTML += listItems;
                }
                display.textContent = resultHTML;
            }

            /** * [ACTION] 추가 버튼 클릭 시 데이터 늘리기 */
            function addInput() {
                contentData.push(""); // 데이터 배열에 새 칸 추가

                const clone = /** @type {DocumentFragment} */ (input_temp.content.cloneNode(true));
                const new_input = /** @type {HTMLInputElement} */ (clone.querySelector(".content"));
                content_list?.appendChild(clone);
                new_input?.focus();

                render();
            }
            /** [RENDER-LEFT] 데이터 배열의 길이에 맞춰 인풋창 리스트를 쇄신함 */
            function renderLeft() {
                // 제목(index 0)을 제외한 나머지 데이터로 인풋 HTML 생성
                const inputHTML = contentData
                    .slice(1)
                    .map(
                        (text, idx) => `
        <input type="text" class="content" value="${text}" data-index="${idx}">
    `,
                    )
                    .join("");

                if (content_list) {
                    content_list.innerHTML = inputHTML;
                }
            }

            /** * [EVENT] 실시간 입력 감지 및 데이터 업데이트
             */
            window.addEventListener("input", (ev) => {
                const target = /** @type {HTMLInputElement} */ (ev.target);

                if (target.matches(".input")) {
                    // 제목 입력 시 (공백 제거 후 저장)
                    contentData[0] = target.value.replace(/\s/g, "");
                    target.value = contentData[0]; // 화면에도 공백 제거된 값 반영
                } else if (target.matches(".content")) {
                    // 추가된 리스트 인풋 입력 시
                    const allContents = [...document.querySelectorAll(".content")];
                    const index = allContents.indexOf(target);
                    contentData[index + 1] = target.value; // 0번이 제목이므로 +1
                }

                render();
            });
            window.addEventListener("keydown", (ev) => {
                if (ev.key === "Enter" || ev.key === "ArrowDown") {
                    const target = /** @type {HTMLInputElement} */ (ev.target);

                    // 1. 현재 타겟이 리스트 인풋(.content)인 경우만 체크
                    if (target.matches(".content")) {
                        ev.preventDefault(); // 기본 줄바꿈 방지

                        const allInputs = [...document.querySelectorAll(".content")];
                        const currentIndex = allInputs.indexOf(target);
                        const isLast = currentIndex === allInputs.length - 1;

                        if (isLast) {
                            // 마지막 인풋이면 새로 추가!
                            addInput();
                        } else {
                            // 중간 인풋이면 다음 인풋으로 포커스 이동!
                            /** @type {HTMLInputElement} */ (allInputs[currentIndex + 1]).focus();
                            /** @type {HTMLInputElement} */ (allInputs[currentIndex + 1]).select();
                        }
                    }
                    // 2. 제목 인풋(.input)에서 Enter를 쳤을 때도 첫 번째 내용으로 이동하게 하면 금상첨화!
                    else if (target.matches(".input")) {
                        ev.preventDefault();
                        const firstContent = /** @type {HTMLInputElement} */ (document.querySelector(".content"));
                        if (firstContent) {
                            firstContent.focus();
                            firstContent.select();
                        } else {
                            addInput(); // 내용이 하나도 없으면 새로 만듦
                        }
                    }
                }
                if (ev.key === "ArrowUp") {
                    const target = /** @type {HTMLInputElement} */ (ev.target);

                    // 1. 현재 타겟이 리스트 인풋(.content)인 경우만 체크
                    if (target.matches(".content")) {
                        ev.preventDefault(); // 기본 줄바꿈 방지

                        const allInputs = [...document.querySelectorAll(".content")];
                        const currentIndex = allInputs.indexOf(target);
                        const isFirst = currentIndex === 0;

                        if (isFirst) {
                            input_main.focus();
                            input_main.select();
                        } else {
                            // 중간 인풋이면 다음 인풋으로 포커스 이동!
                            /** @type {HTMLInputElement} */ (allInputs[currentIndex - 1]).focus();
                            /** @type {HTMLInputElement} */ (allInputs[currentIndex - 1]).select();
                        }
                    }
                }
                if (ev.key === "Delete") {
                    if (contentData.length <= 1) return;

                    // 데이터 삭제 (마지막 요소 제거)
                    contentData.pop();

                    // 양쪽 화면 모두 갱신
                    render();
                    renderLeft();

                    // 마지막 인풋에 포커스 (상남자식 배려)
                    const lastInput = /** @type {HTMLInputElement} */ (document.querySelector(".content:last-child")) || input_main;
                    lastInput.focus();
                    if ("select" in lastInput) lastInput.select();
                }
            });

            // 특정 문자열을 바로 클립보드에 복사
            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    alert(`글이 클립보드에 저장되었습니다.`);
                });
            }
            window.addEventListener("contextmenu", (ev) => ev.preventDefault());
            document.querySelector(".right-menu")?.addEventListener("click", (ev) => {
                copyToClipboard(display.textContent);
            });

            // 초기 실행
            render();
        </script>
    </body>
</html>
