<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>H Express</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                height: calc(100vh);
                gap: 20px;
                padding: 20px;
            }
            #container {
                display: flex;
                gap: 12px;
                width: fit-content;
                height: fit-content;
                align-items: center;
            }
            #container > * {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 5px 8px;
            }
            h1 {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 200px;
                aspect-ratio: 22/9;
                background-color: #e2e2e2;
            }
            a {
                display: flex;
                align-items: center;
                justify-content: center;
                color: inherit;
                text-decoration: none;
                cursor: default;
            }
            .link {
                width: 100%;
            }
            #input {
                font-size: 14px;
                width: 220px;
                flex-shrink: 0;
            }
            #history-list {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: fit-content;
                height: fit-content;
                gap: 20px;
            }
            #history-list > div {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 350px;
                padding: 8px 12px;
                font-size: 20px;
                font-weight: 600;
                text-align: center;
                border-radius: 15px;
                background-color: #e2e2e2;
                box-shadow: 1px 1px 1px #b9b9b9;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }
            #history-list > div:hover {
                transform: translateY(-3px);
                box-shadow: 3px 5px 15px #b9b9b9;
            }
            #btn-area {
                display: flex;
                align-items: center;
                justify-content: center;
                width: fit-content;
                height: fit-content;
                gap: 10px;
            }
            #btn-area > button {
                padding: 4px 8px;
            }
            .button-bar {
                display: flex;
                align-items: center;
                gap: 10px;
                width: 100%;
                margin-top: 5px;
            }
            .button-bar > * {
                flex-grow: 1;
            }
            #memo-modal {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: fixed;
                left: 0;
                top: 0;
                width: 100vw;
                height: 100vh;
                background-color: #fff;
                z-index: 1000;
                background-color: rgb(0, 0, 0, 0.5);
                visibility: hidden;
                opacity: 0;
                transition: 0.3s;
            }
            #modal-toggle:checked + #memo-modal {
                visibility: visible;
                opacity: 1;
            }
            #memo-modal > * {
                user-select: none;
            }
            .memo-modal-content {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 20px;
                background-color: #fff;
                border-radius: 10px;
            }
            .memo-modal-content > button {
                outline: none;
                border: none;
                padding: 2px 0;
                box-shadow: 2px 2px 3px #b9b9b9;
                transition: 0.3s;
            }
            .memo-modal-content > button:hover {
                box-shadow: 3px 3px 7px #b9b9b9;
                font-weight: 700;
            }
            .row {
                display: flex;
                gap: 10px;
                align-items: center;
                justify-content: center;
                padding: 0 5px;
                font-size: 14px;
            }
            .row > input {
                padding: 6px 10px;
            }
            .memo-span {
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                width: 100%;
                word-break: break-all;
            }
        </style>
    </head>
    <body>
        <input type="checkbox" name="modal-toggle" id="modal-toggle" hidden />
        <div id="memo-modal" onclick="memoModalToggle()">
            <div class="memo-modal-content">
                <div class="row">
                    <label for="memo-to">메모할 번호</label>
                    <input type="text" id="memo-to" disabled />
                </div>
                <div class="row" onclick="event.stopPropagation()">
                    <label for="memo-txt">메모할 내용</label>
                    <input type="text" id="memo-txt" />
                </div>
                <button type="submit" onclick="saveMemo()">작성하기</button>
            </div>
        </div>
        <a href="https:/hitomi.la"><h1>H</h1></a>
        <div id="container">
            <input type="text" id="input" inputmode="text" pattern="[0-9]*" autofocus autocomplete="off" placeholder="번호 또는 메모 혹은 강호의 도리" />
            <button id="go" type="submit">이동하기</button>
            <button id="change" type="submit" onclick="clearInput()">초기화</button>
        </div>
        <div id="btn-area">
            <button onclick="clearHistory()">기록 보관소 삭제</button>
            <button onclick="clearAll()">기록 보관소 초기화</button>
            <button onclick="exportHistory()" style="background-color: #d1e7dd">기록 내보내기 (JSON)</button>
            <button onclick="importHistory()" style="background-color: #fff3cd">가져오기</button>
        </div>
        <div id="history-list"></div>

        <script>
            // @ts-check
            const input = document.getElementById("input");
            const button = document.getElementById("go");
            const container = document.getElementById("container");
            const history_list = document.getElementById("history-list");

            container.addEventListener("click", btnClick);
            container.addEventListener("keydown", btnClick);
            input.addEventListener("input", autoSearch);
            function autoSearch() {
                /* @type {string} - input된 방식
                     * * 그냥 입력하기 (insertText)
                     * 붙여넣기 (insertFromPaste)
                     * 되돌리기
                     * 지우기
                     * 등등... 
                    const type = ev.inputType;*/

                /* @type {string} - 정규식으로 숫자만 잘라냄 
                const only_nums = target.value.replace(/[^0-9]+/g, "");
                const max_length = 7;
                let clipped = only_nums;
                if (clipped.length > max_length) {
                    clipped = clipped.slice(-max_length);
                }

                if (target.value !== clipped) {
                    target.value = clipped;
                }*/
                const val = input.value;
                const clean_val = val.replace(/[^0-9]+/g, "");

                const history = getLocalStorage("recent_searches");
                const memo_history = getLocalStorage("memo_storage", {});
                /* const filtered = target.value ? history.filter((item) => item.startsWith(target.value)) : history; */
                const filtered = history.filter((item) => {
                    const memo_text = memo_history[item] || "";
                    return item.startsWith(val) || memo_text.includes(val) || (clean_val !== "" && item.startsWith(clean_val));
                });

                renderHistory(filtered);
            }
            function btnClick(ev) {
                if (ev instanceof KeyboardEvent) {
                    if (ev.key === "Enter") {
                        ev.preventDefault();
                    } else return;
                }
                if (ev.type === "keydown" && ev.key !== "Enter") return;
                if (ev.type === "click" && ev.target !== button) return;

                const val = input.value.trim();
                if (!/^\d{7}$/.test(val)) {
                    console.log("이동은 숫자 7자리만 가능합니다.");
                    return;
                }
                if (!(input.value.length === 7)) {
                    clearInput();
                    return;
                }

                const history = getLocalStorage("recent_searches");

                saveSearchTerm(val);
                renderHistory();
                window.open(`https://hitomi.la/galleries/${input.value}.html`);
                clearInput();
            }
            /** 강호의 도리를 변환하는 함수 */
            function change() {
                /** @type {string} - input입니다. */
                const txt = input.value;
                input.value = txt.replace(/[^0-9]+/g, "");
                input.focus();
            }
            /**
             * 저장소에 문자열 저장하는 함수 (저장소 기본값은 recent_searches)
             * @param {string} term - 저장소에 저장할 문자열(여기서는 번호 위주)
             * @param {string} [stroage_name = "recent_searches"] - 저장소 이름 (문자열)
             */
            function saveSearchTerm(term, storage_name = "recent_searches") {
                if (!term || term.trim() === "") return;
                const history = getLocalStorage(storage_name);
                if (term === history[0]) return;
                const new_history = [term, ...history.filter((item) => item !== term)];
                setLocalStorage("recent_searches", new_history);
                renderHistory();
            }
            function clearHistory() {
                if (history_list.children.length >= 0) {
                    if (confirm("진짜 기록 저장소를 삭제?")) {
                        localStorage.removeItem("recent_searches");
                        location.reload();
                    }
                }
            }
            function clearAll() {
                if (history_list.children.length > 0) {
                    if (confirm("진짜 기록 전체 삭제?")) {
                        localStorage.clear();
                        location.reload();
                    }
                }
            }
            /** input을 초기화하는 함수 */
            function clearInput() {
                input.value = "";
                input.focus();
                autoSearch();
            }

            /** memoModalToggle:  메모 작성창 토글 함수
             * 모달 체크박스를 조절합니다 */
            function memoModalToggle() {
                /** @type {HTMLElement} - 모달 토글 버튼 */
                const toggle_btn = document.getElementById("modal-toggle");
                toggle_btn.checked = !toggle_btn.checked;
                if (toggle_btn.checked) {
                    setTimeout(() => {
                        const memo_txt = document.getElementById("memo-txt");
                        if (memo_txt) memo_txt.focus();
                    }, 50);
                }
            }

            /** saveMemo 함수 
            * 메모 작성을 컨트롤하는 함수입니다.
            @param {string} key - 메모가 작성될 번호입니다. 
            @param {string} txt - 메모 내용입니다. 
            @example saveMemo(key, "abc") */
            function saveMemo() {
                /** @type {Object<string, string>} - memo는 ["번호", "메모"] 로 이루어집니다.*/
                const memos = getLocalStorage("memo_storage", {});
                const key = document.getElementById("memo-to").value;
                const txt = document.getElementById("memo-txt").value;
                if (!getLocalStorage("recent_searches").includes(key)) {
                    console.log("이건 뭐 하는 짓이시죠?");
                    return;
                }
                if (txt.trim() === "") {
                    if (memos[key]) {
                        delete memos[key];
                    }
                } else {
                    memos[key] = txt;
                }

                setLocalStorage("memo_storage", memos);
                renderHistory();
            }

            /** renderHistory
             * localStorage에서 최근 기록을 가져와 화면에 표시하는 함수입니다. (HTMLdoc 구조 포함)
             * @param {list} [custom_data=null] 리스트입니다. (custom_data가 없으면 localStorage에서 recent_searches를 가져옵니다.)}
             */
            function renderHistory(custom_data = null) {
                if (!history_list) return;

                const history = custom_data || getLocalStorage("recent_searches");
                const memo_history = getLocalStorage("memo_storage", {});

                history_list.innerHTML = "";

                history.forEach((item) => {
                    const div = document.createElement("div");
                    const button_bar = document.createElement("div");
                    button_bar.classList.add("button-bar");
                    const a = document.createElement("a");
                    a["href"] = `https://hitomi.la/galleries/${item}.html`;
                    a.textContent = `${item}`;
                    a.classList.add("link");
                    a.addEventListener("click", () => {
                        saveSearchTerm(item);
                    });

                    const del = document.createElement("button");
                    del.textContent = "삭제";
                    del.classList.add("button");

                    del.addEventListener("click", (ev) => {
                        ev.preventDefault();
                        ev.stopPropagation();
                        if (confirm(`삭제해요? '${item}' ?`)) {
                            const new_history = history.filter((h) => h !== item);
                            setLocalStorage("recent_searches", new_history);
                            renderHistory();
                        }
                    });

                    /** @type {HTMLButtonElement} - */
                    const memo = document.createElement("button");
                    memo.textContent = "메모";
                    memo.classList.add("button");
                    memo.addEventListener("click", (ev) => {
                        memoModalToggle();
                        const memo_to = document.getElementById("memo-to");
                        const memo_txt = document.getElementById("memo-txt");
                        if (memo_to.value !== item) {
                            memo_txt.value = memo_history[item] || "";
                        }
                        memo_to.value = item;
                        memo_txt.focus();
                    });

                    div.appendChild(a);
                    if (memo_history[item]) {
                        const span = document.createElement("span");
                        span.textContent = memo_history[item];
                        span.classList.add("memo-span");
                        div.appendChild(span);
                    }
                    button_bar.appendChild(memo);
                    button_bar.appendChild(del);
                    div.appendChild(button_bar);
                    history_list.appendChild(div);
                });
            }

            /**
             * @typedef {Object} ExportResult
             * @property {boolean} success - 성공 여부
             * @property {string} [fileName] - 저장된 파일명
             */

            /**
             * 내보내기 엔진
             * 현재 로컬 스토리지에 저장된 '최근 검색 기록'을 JSON 파일로 추출합니다.
             * @param {string} storage_key - 내보낼 로컬스토리지 키 (기본값: 'recent_searches')
             * @returns {ExportResult} 작업 결과 보고서
             */
            function exportHistory(storage_key = "recent_searches") {
                try {
                    // 1. 데이터 가져오기 (이미 만들어두신 getLocalStorage 활용!)
                    const data = getLocalStorage(storage_key);

                    if (!data || data.length === 0) {
                        alert("내보낼 기록이 텅 비어있습니다!");
                        return { success: false };
                    }

                    // 2. 파일 이름 생성 (h_backup_2024-05-22.json 형식)
                    const date = new Date().toISOString().split("T")[0];
                    const fileName = `h_express_backup_${date}.json`;

                    // 3. Blob 생성 (데이터를 파일 덩어리로 변환)
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });

                    // 4. 가상 앵커(a) 태그를 이용한 다운로드 트리거
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = fileName;

                    document.body.appendChild(link);
                    link.click(); // 강제 클릭으로 다운로드 시작

                    // 5. 뒷정리 (메모리 해제 및 태그 삭제)
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    console.log(`🚀 ${fileName} 내보내기 성공!`);
                    return { success: true, fileName };
                } catch (e) {
                    console.error("내보내기 중 오류 발생:", e);
                    alert("내보내기 실패! 콘솔을 확인해주세요.");
                    return { success: false };
                }
            }
            /**
             * 가져오기 엔진
             * JSON 백업 파일을 읽어 로컬 스토리지의 기존 데이터와 병합합니다.
             * * * 동작 순서:
             * 1. 파일 선택창 띄우기 (hidden input)
             * 2. 파일 읽기 (FileReader API)
             * 3. 데이터 검증 (배열인지, 7자리 숫자인지 확인)
             * 4. 기존 데이터와 중복 제거 및 병합
             * 5. 화면 다시 그리기 (renderHistory)
             * * @returns {Promise<boolean>} 성공 시 true 반환
             */
            function importHistory() {
                return new Promise((resolve) => {
                    // 1. 파일 선택용 가상 input 생성
                    const input = document.createElement("input");
                    input.type = "file";
                    input.accept = ".json"; // JSON 파일만 허용

                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return resolve(false);

                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                /** @type {any[]} */
                                const importedData = JSON.parse(event.target.result);

                                // 2. [검증] 데이터가 배열인지, 그리고 각 항목이 7자리 숫자인지 확인
                                if (!Array.isArray(importedData)) throw new Error("배열 형식이 아닙니다.");

                                const isValid = importedData.every((item) => /^[0-9]{7}$/.test(item));
                                if (!isValid) throw new Error("유효하지 않은 데이터 형식이 포함되어 있습니다.");

                                // 3. 병합 (기존 데이터 + 새 데이터, 중복 제거)
                                const currentHistory = getLocalStorage("recent_searches");
                                const mergedHistory = [...new Set([...importedData, ...currentHistory])];

                                // 4. 저장 및 UI 갱신
                                setLocalStorage("recent_searches", mergedHistory);
                                renderHistory();

                                alert(`성공적으로 ${importedData.length}개의 기록을 가져왔습니다!`);
                                resolve(true);
                            } catch (err) {
                                alert(`가져오기 실패: ${err.message}`);
                                resolve(false);
                            }
                        };
                        reader.readAsText(file);
                    };

                    input.click(); // 파일 선택창 강제 오픈
                });
            }

            /**
             * 저장소 이름 받아서 가져옵니다
             * @param {string} [storage_name = "recent_searches"] - 저장소의 이름 (문자열이어야 해!)
             * @param {any} default_value - 데이터가 없을 경우 저장할 초기값 (기본값: [])
             * @returns {any} 파싱된 데이터 객체 또는 배열
             */
            function getLocalStorage(storage_name = "recent_searches", default_value = []) {
                const data = localStorage.getItem(storage_name);

                // 데이터가 없으면 초기값을 저장하고 반환합니다.
                if (data === null) {
                    return default_value;
                }

                // 데이터가 있으면 JSON으로 변환해서 반환합니다.
                try {
                    return JSON.parse(data);
                } catch (e) {
                    console.error("localStorage 파싱 에러:", e);
                    return default_value;
                }
            }

            /**
             * 데이터를 JSON 문자열로 변환하여 localStorage에 저장합니다.
             * @param {string} [storage_name=recent_searches] - 로컬스토리지 키 이름 (없으면 recent_searches)
             * @param {any} data - 저장할 데이터 (객체나 배열 등)
             */
            function setLocalStorage(storage_name = "recent_searches", data) {
                localStorage.setItem(storage_name, JSON.stringify(data));
            }

            window.addEventListener("DOMContentLoaded", () => {
                renderHistory();
                document.querySelectorAll("a[href^='http']").forEach((a) => {
                    a["target"] = "_blank";
                    a["rel"] = "noopen noreferrer";
                });
            });
            document.getElementById("memo-txt").addEventListener("keydown", (ev) => {
                if (ev.key === "Enter") {
                    saveMemo();
                    memoModalToggle();
                }
                if (ev.key === "Escape") {
                    memoModalToggle();
                }
            });
        </script>
    </body>
</html>
