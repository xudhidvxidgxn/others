<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                user-select: none;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                padding: 20px;
            }
            #display {
                display: flex;
                flex-direction: column;
                gap: 10px;
                align-items: center;
                justify-content: center;
                width: 500px;
                margin-top: 20px;
            }
            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                padding: 10px;
                border-radius: 15px;
                background-color: #dfdfdf;
            }
            .content > .content-no {
                font-size: 24px;
                font-weight: 700;
            }
            .content > .content-title {
                font-size: 16px;
            }
            .content > .content-link {
                font-size: 14px;
                color: rgb(0, 0, 0, 0.5);
            }
            .btn-bar {
                display: flex;
                width: 100%;
                gap: 10px;
                margin-top: 5px;
            }
            .btn-bar > button {
                flex-grow: 1;
            }
        </style>
    </head>
    <body>
        <div id="controller">
            <input type="text" id="input-num" inputmode="numeric" />
            <input type="text" id="input-title" />
        </div>
        <div id="display"></div>
        <script src="1.js"></script>
    </body>
</html>
