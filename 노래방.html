<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                user-select: none;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                padding: 20px;
            }
            #display {
                display: grid;
                grid-template-columns: repeat(1, 1fr);
                gap: 10px;
                width: 95%;
                max-width: 1000px;
                margin-top: 20px;
            }
            #controller {
                display: flex;
                width: 100%;
                max-width: 700px;
                align-items: stretch;
            }
            #input-num {
                padding: 8px 12px;
                flex-grow: 1;
                margin-right: 10px;
                flex-shrink: 0.8;
                min-width: 0;
            }
            #go {
                padding: 0 14px;
                flex-shrink: 0;
            }
            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                padding: 10px;
                border-radius: 15px;
                background-color: #dfdfdf;
            }
            .content > .content-no {
                font-size: 24px;
                font-weight: 700;
            }
            .content > .content-title {
                font-size: 16px;
            }
            .content > .content-link {
                font-size: 14px;
                color: rgb(0, 0, 0, 0.5);
            }
            .btn-bar {
                display: flex;
                width: 100%;
                gap: 10px;
                margin-top: 5px;
            }
            .btn-bar > button {
                flex-grow: 1;
            }
        </style>
    </head>
    <body>
        <div id="controller">
            <input type="text" id="input-num" placeholder="번호 또는 제목 입력" />
            <button id="go">go?</button>
        </div>
        <div id="display"></div>
        <script src="1.js"></script>
    </body>
</html>
