<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="1/1.css" />
        <style></style>
    </head>
    <body>
        <div id="modal-area">
            <div id="modal-content">
                <div class="form">
                    <div class="form-row">
                        <label for="no">번호</label>
                        <input type="text" class="form-input" id="no" inputmode="numeric">
                    </div>
                    <div class="form-row">
                        <label for="title">제목</label>
                        <input type="text" class="form-input" id="title">
                    </div>
                    <div class="form-row">
                        <label for="link">링크</label>
                        <input type="text" class="form-input" id="link">
                    </div>
                    <div class="form-row">
                        <button type="submit">저장하기</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="controller">
            <input
                type="text"
                id="input-num"
                placeholder="번호 또는 제목 입력"
            />
            <button id="go">go?</button>
        </div>
        <div id="display"></div>
        <script src="1/1.js"></script>
    </body>
</html>
